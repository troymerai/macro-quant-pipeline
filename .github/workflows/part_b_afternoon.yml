name: Part B - Afternoon Deep Research & PDF

on:
  schedule:
    # 한국 시간(KST) 오후 3시는 UTC 기준 오전 6시입니다.
    - cron: '0 6 * * 1-5' # 월~금 평일 오후 3시에 작동
  workflow_dispatch:

jobs:
  run-part-b:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. 리눅스용 WeasyPrint 의존성 설치 (아주 중요!)
        # 리눅스 컴퓨터에 PDF를 그릴 도구와 '한글 폰트(fonts-noto-cjk)'를 설치합니다.
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libjpeg-dev libopenjp2-7-dev libffi-dev fonts-noto-cjk
          fc-cache -fv

      - name: 3. 파이썬 환경 세팅 (3.12)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 4. 파이썬 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 5. Part B 파이프라인 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PUBLIC_CHANNEL_ID: ${{ secrets.TELEGRAM_PUBLIC_CHANNEL_ID }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: python -m pipelines.run_part_b